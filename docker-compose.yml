services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ssanta
      POSTGRES_PASSWORD: ssanta
      POSTGRES_DB: ssanta
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ssanta -d ssanta"]
      interval: 5s
      timeout: 5s
      retries: 10

  otel-lgtm:
    image: grafana/otel-lgtm:latest
    ports:
      - "3000:3000"   # Grafana UI
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    environment:
      - OTEL_METRIC_EXPORT_INTERVAL=1000
    volumes:
      - ./prometheus.yml:/otel-lgtm/prometheus.yaml

  migrate:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://ssanta:ssanta@db:5432/ssanta?sslmode=disable
      MIGRATIONS_DIR: /app/migrations
      ADMIN_USERNAME: joseph
    entrypoint: ["/app/migrate"]

  server:
    build: .
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      otel-lgtm:
        condition: service_started
    environment:
      DATABASE_URL: postgres://ssanta:ssanta@db:5432/ssanta?sslmode=disable
      HTTP_ADDR: ":8080"
      SESSION_SECRET: dev-secret-change-me-to-at-least-32-bytes
      SECURE_COOKIES: "false"
      OTLP_ENDPOINT: otel-lgtm:4317
      RATE_LIMIT_AUTH_MAX: "1000"
      RATE_LIMIT_AUTH_WINDOW: "1m"
      RATE_LIMIT_SEARCH_MAX: "1000"
      RATE_LIMIT_SEARCH_WINDOW: "1m"
      RATE_LIMIT_ROOM_MAX: "1000"
      RATE_LIMIT_ROOM_WINDOW: "1m"
      RATE_LIMIT_INVITE_MAX: "1000"
      RATE_LIMIT_INVITE_WINDOW: "1m"
      RATE_LIMIT_WS_MAX: "1000"
      RATE_LIMIT_WS_WINDOW: "1m"
      RATE_LIMIT_DM_MAX: "1000"
      RATE_LIMIT_DM_WINDOW: "1m"
    ports:
      - "8080:8080"

  # Run unit tests inside the build image. Integration tests are skipped
  # by default (they require SSANTA_INTEGRATION=1 and Testcontainers).
  test:
    build:
      context: .
      target: build
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://ssanta:ssanta@db:5432/ssanta?sslmode=disable
      SSANTA_INTEGRATION: "0"
    command: ["sh", "-c", "go vet ./... && golangci-lint run ./... && go test ./... -v"]
    tty: true

  # Run integration tests which use Testcontainers. This mounts the host
  # Docker socket so the tests can start containers from inside this
  # container. Use with caution (`docker compose run --rm integration-test`).
  integration-test:
    build:
      context: .
      target: build
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://ssanta:ssanta@db:5432/ssanta?sslmode=disable
      SSANTA_INTEGRATION: "1"
    command: ["sh", "-c", "go test ./internal/store ./internal/service -count=1 -v"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    tty: true

volumes:
  db-data:

