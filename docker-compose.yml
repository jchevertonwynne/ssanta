services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ssanta
      POSTGRES_PASSWORD: ssanta
      POSTGRES_DB: ssanta
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ssanta -d ssanta"]
      interval: 5s
      timeout: 5s
      retries: 10

  otel-lgtm:
    image: grafana/otel-lgtm:latest
    ports:
      - "3000:3000"   # Grafana UI
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    environment:
      - OTEL_METRIC_EXPORT_INTERVAL=1000

  migrate:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://ssanta:ssanta@db:5432/ssanta?sslmode=disable
      MIGRATIONS_DIR: /app/migrations
    entrypoint: ["/app/migrate"]

  server-prod:
    profiles: ["prod"]
    build: .
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      otel-lgtm:
        condition: service_started
    environment:
      DATABASE_URL: postgres://ssanta:ssanta@db:5432/ssanta?sslmode=disable
      HTTP_ADDR: ":8080"
      SESSION_SECRET: dev-secret-change-me
      SECURE_COOKIES: "true"
      OTLP_ENDPOINT: otel-lgtm:4317
    ports:
      - "8080:8080"

  server:
    build: .
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      otel-lgtm:
        condition: service_started
    environment:
      DATABASE_URL: postgres://ssanta:ssanta@db:5432/ssanta?sslmode=disable
      HTTP_ADDR: ":8080"
      SESSION_SECRET: dev-secret-change-me
      SECURE_COOKIES: "false"
      OTLP_ENDPOINT: otel-lgtm:4317
    ports:
      - "8080:8080"

volumes:
  db-data:

