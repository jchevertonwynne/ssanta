services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ssanta
      POSTGRES_PASSWORD: ssanta
      POSTGRES_DB: ssanta
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ssanta -d ssanta"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://ssanta:ssanta@db:5432/ssanta?sslmode=disable
      HTTP_ADDR: ":8080"
      SESSION_SECRET: dev-secret-change-me
    ports:
      - "8090:8080"

volumes:
  db-data:
