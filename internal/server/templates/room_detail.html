<div class="bar">
    <span>Logged in as {{.CurrentUsername}}</span>
    <button hx-post="/logout" hx-target="#content" hx-swap="innerHTML">Log out</button>
    <button hx-get="/content" hx-target="#content" hx-swap="innerHTML" hx-push-url="/">Home</button>
</div>

<div class="cols">
    {{template "room_sidebar.html" .}}

    <section>
        <h3>Chat</h3>
        <div id="chat-controls" style="display:flex;gap:1rem;align-items:center;margin-bottom:0.5rem;font-size:0.85em;">
            <label style="cursor:pointer;user-select:none;"><input type="checkbox" id="sound-toggle"> Sound</label>
            <label style="cursor:pointer;user-select:none;"><input type="checkbox" id="notif-toggle"> Browser notifications</label>
        </div>
        <details id="search-bar-wrapper" style="margin-bottom:0.4rem;font-size:0.85em;">
            <summary style="cursor:pointer;user-select:none;">Search</summary>
            <div id="search-bar" style="display:flex;gap:0.5rem;align-items:center;margin-top:0.25rem;">
                <input id="search-input" type="search" placeholder="Search messages…" style="flex:1;min-width:0;">
                <label style="cursor:pointer;user-select:none;white-space:nowrap;"><input type="checkbox" id="search-regex"> Regex</label>
                <select id="search-sender" style="font-size:0.85em;">
                    <option value="">All senders</option>
                </select>
                <button type="button" id="search-clear-btn" style="font-size:0.85em;">Clear</button>
            </div>
        </details>
        <div id="chat-messages" style="height: 500px; overflow-y: auto; border: 1px solid #ddd; padding: 0.5rem; margin-bottom: 0.5rem; background: #f9f9f9;"></div>
        <div id="typing-indicator" style="min-height:1.2em;font-size:0.8em;color:#888;font-style:italic;margin-bottom:0.25rem;"></div>
        <form id="chat-form" style="display: flex; gap: 0.5rem; align-items: center;">
            {{if not .IsDMRoom}}
            <select id="chat-target" {{if not .IsMember}}disabled{{end}}>
                <option value="0">Everyone</option>
                {{range .Members}}
                {{if ne .ID $.CurrentUserID}}
                <option value="{{.ID}}">{{.Username}}</option>
                {{end}}
                {{end}}
            </select>
            {{end}}
            <input id="chat-input" type="text" autocomplete="off"
                   placeholder="{{if .IsMember}}Type a message...{{else if .IsCreator}}Join to send messages{{else}}Join the room to chat{{end}}"
                   style="flex: 1;" maxlength="500"
                   {{if not .IsMember}}disabled{{end}}>
            <button type="submit" {{if not .IsMember}}disabled{{end}}>Send</button>
        </form>
    </section>
</div>

<script nonce="{{.ScriptNonce}}">
(function() {
    const chatMessages = document.getElementById('chat-messages');
    const chatForm = document.getElementById('chat-form');
    const chatInput = document.getElementById('chat-input');
    const chatTarget = document.getElementById('chat-target');

    const isMember = {{if .IsMember}}true{{else}}false{{end}};
    const isCreator = {{if .IsCreator}}true{{else}}false{{end}};
    const roomId = {{.Room.ID}};
    let roomPGPRequired = {{if .Room.PGPRequired}}true{{else}}false{{end}};
    const currentUserID = String({{.CurrentUserID}});
    const currentUsername = "{{.CurrentUsername}}";
    const memberPGPKeys = JSON.parse(atob('{{.MemberPGPKeysBase64}}'));
    const csrfToken = document.querySelector('meta[name="csrf-token"]')?.getAttribute('content') || '';

    const typingIndicator = document.getElementById('typing-indicator');
    let typingUsers = new Set();
    let isTyping = false;
    let typingDebounceTimer = null;
    let typingThrottleTimer = null;

    let loadedPrivateKey = null;
    const messageHistory = [];
    let onlineUserIDs = new Set();
    const sentMessageIds = new Set();
    const seenMessageIds = new Set();
    let serverHistoryLoaded = false;
    let loadingHistory = false;
    let earliestMessageId = null;
    let lastSeenMessageId = null;

    // Clean up legacy message persistence keys
    (function() {
        const prefix = roomId + ':messages';
        const keys = [prefix, prefix + '_persist', prefix + '_storage', prefix + '_passphrase'];
        keys.forEach(function(k) {
            localStorage.removeItem(k);
            sessionStorage.removeItem(k);
        });
    })();

    // --- Message grouping state ---
    let lastMsgUsername = null;
    let lastMsgTime = null;

    function resetGroupingState() {
        lastMsgUsername = null;
        lastMsgTime = null;
    }

    // --- Search state ---
    let searchActive = false;
    const knownSenders = new Set();

    function updateSenderOptions(username) {
        if (!username || knownSenders.has(username)) return;
        knownSenders.add(username);
        const opt = document.createElement('option');
        opt.value = username;
        opt.textContent = username;
        document.getElementById('search-sender').appendChild(opt);
    }

    function messageMatchesSearch(data) {
        const rawText = document.getElementById('search-input').value;
        const senderVal = document.getElementById('search-sender').value;
        const regexMode = document.getElementById('search-regex').checked;

        if (senderVal && data.username !== senderVal) return false;
        if (!rawText) return true;

        const haystack = data.message || '';
        if (regexMode) {
            try {
                return new RegExp(rawText, 'i').test(haystack);
            } catch (e) {
                return false;
            }
        }
        return haystack.toLowerCase().includes(rawText.toLowerCase());
    }

    async function applySearch() {
        const rawText = document.getElementById('search-input').value;
        const senderVal = document.getElementById('search-sender').value;
        const hasFilter = rawText || senderVal;

        if (!hasFilter) {
            searchActive = false;
            await rerenderAllMessages();
            return;
        }

        searchActive = true;
        chatMessages.innerHTML = '';
        if (reconnectMsgEl) reconnectMsgEl = null;
        resetGroupingState();

        for (const data of messageHistory) {
            if (messageMatchesSearch(data)) {
                const el = await buildMessageElement(data);
                chatMessages.appendChild(el);
            }
        }
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    // --- Sound & browser notification controls ---

    const soundToggle = document.getElementById('sound-toggle');
    const notifToggle = document.getElementById('notif-toggle');

    soundToggle.checked = localStorage.getItem('chat_sound_enabled') === 'true';
    notifToggle.checked = localStorage.getItem('chat_notif_enabled') === 'true';

    soundToggle.onchange = function() {
        localStorage.setItem('chat_sound_enabled', soundToggle.checked);
    };

    notifToggle.onchange = function() {
        if (!notifToggle.checked) {
            localStorage.setItem('chat_notif_enabled', 'false');
            return;
        }
        if (Notification.permission === 'denied') {
            notifToggle.checked = false;
            alert('Notifications are blocked by the browser. Enable them in your browser settings.');
            return;
        }
        Notification.requestPermission().then(function(perm) {
            if (perm === 'granted') {
                localStorage.setItem('chat_notif_enabled', 'true');
            } else {
                notifToggle.checked = false;
                localStorage.setItem('chat_notif_enabled', 'false');
            }
        });
    };

    // Revoke notif toggle if permission was revoked externally
    if (Notification.permission !== 'granted' && notifToggle.checked) {
        notifToggle.checked = false;
        localStorage.setItem('chat_notif_enabled', 'false');
    }

    function playNotificationSound() {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.frequency.value = 880;
            gain.gain.setValueAtTime(0.3, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
            osc.start(ctx.currentTime);
            osc.stop(ctx.currentTime + 0.3);
        } catch(e) {}
    }

    function sendBrowserNotification(username, text) {
        if (!notifToggle.checked || Notification.permission !== 'granted' || !document.hidden) return;
        const n = new Notification(username, { body: text.slice(0, 80) });
        n.onclick = function() { window.focus(); n.close(); };
    }

    // --- WebSocket with auto-reconnect ---

    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    let ws;
    let reconnectTimer = null;
    let reconnectDelay = 1000;
    let intentionalClose = false;
    let wasDisconnected = false;
    let reconnectMsgEl = null;

    function showReconnectMsg(text) {
        if (!reconnectMsgEl) {
            reconnectMsgEl = document.createElement('div');
            reconnectMsgEl.style.marginBottom = '0.5rem';
            reconnectMsgEl.style.fontStyle = 'italic';
            chatMessages.appendChild(reconnectMsgEl);
        }
        reconnectMsgEl.style.color = '#b8860b';
        reconnectMsgEl.textContent = text;
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function clearReconnectMsg() {
        if (reconnectMsgEl && reconnectMsgEl.parentNode) {
            reconnectMsgEl.parentNode.removeChild(reconnectMsgEl);
        }
        reconnectMsgEl = null;
    }

    function updateTypingIndicator() {
        const names = Array.from(typingUsers);
        if (names.length === 0) {
            typingIndicator.textContent = '';
        } else if (names.length === 1) {
            typingIndicator.textContent = names[0] + ' is typing…';
        } else if (names.length === 2) {
            typingIndicator.textContent = names[0] + ' and ' + names[1] + ' are typing…';
        } else {
            const others = names.length - 2;
            typingIndicator.textContent = names[0] + ', ' + names[1] + ', and ' + others + ' other' + (others > 1 ? 's' : '') + ' are typing…';
        }
    }

    function applyPresenceIndicators() {
        document.querySelectorAll('[data-member-id]').forEach(function(li) {
            const uid = li.getAttribute('data-member-id');
            let dot = li.querySelector('.presence-dot');
            if (!dot) {
                dot = document.createElement('span');
                dot.className = 'presence-dot';
                dot.style.cssText = 'display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px;vertical-align:middle;';
                li.prepend(dot);
            }
            const online = onlineUserIDs.has(uid);
            dot.style.background = online ? '#4caf50' : '#9e9e9e';
            dot.title = online ? 'Online' : 'Offline';
        });
    }

    function disablePresenceIndicators() {
        document.querySelectorAll('.presence-dot').forEach(function(dot) {
            dot.style.display = 'none';
        });
    }

    let pgpSectionWasOpen = false;

    document.body.addEventListener('htmx:beforeRequest', function(evt) {
        if (evt.detail && evt.detail.target && evt.detail.target.id === 'room-sidebar') {
            const details = document.getElementById('pgp-keys-section');
            pgpSectionWasOpen = details ? details.open : false;
        }
    });

    document.body.addEventListener('htmx:afterSwap', function(evt) {
        if (evt.detail && evt.detail.target && evt.detail.target.id === 'room-dynamic') {
            applyPresenceIndicators();
        }
        if (evt.detail && evt.detail.target && evt.detail.target.id === 'room-sidebar') {
            const persist = localStorage.getItem(roomId + ':pgp_persist_across_sessions') === 'true';
            const store = persist ? localStorage : sessionStorage;
            const storedKey = store.getItem(roomId + ':pgp_armored_key');
            const storedPass = store.getItem(roomId + ':pgp_passphrase') || '';
            const keyInput = document.getElementById('pgp-private-key-input');
            const passInput = document.getElementById('pgp-passphrase-input');
            const persistEl = document.getElementById('pgp-persist-toggle');
            if (keyInput) keyInput.value = storedKey || '';
            if (passInput) passInput.value = storedPass;
            if (persistEl) persistEl.checked = persist;
            const details = document.getElementById('pgp-keys-section');
            if (details && pgpSectionWasOpen) details.open = true;
            applyPresenceIndicators();
        }
    });

    function connect() {
        let wsUrl = protocol + '//' + window.location.host + '/rooms/' + roomId + '/ws';
        if (lastSeenMessageId) {
            wsUrl += '?last_seen_id=' + lastSeenMessageId;
        }
        ws = new WebSocket(wsUrl);

        ws.onopen = function() {
            console.log('Connected to chat');
            reconnectDelay = 1000;
            if (wasDisconnected) {
                clearReconnectMsg();
                appendSystemMessage('Reconnected to chat.');
                wasDisconnected = false;
            }
        };

        ws.onmessage = function(event) {
            const data = JSON.parse(event.data);

            if (data.type === 'kicked' || data.type === 'room_deleted') {
                typingUsers.clear();
                updateTypingIndicator();
                intentionalClose = true;
                ws.close();
                window.location.href = '/';
                return;
            }

            if (data.type === 'membership_lost') {
                typingUsers.clear();
                updateTypingIndicator();
                chatInput.disabled = true;
                chatInput.placeholder = 'Join the room to chat';
                document.querySelector('#chat-form button[type=submit]').disabled = true;
                if (chatTarget) chatTarget.disabled = true;
                return;
            }

            if (data.type === 'membership_gained') {
                chatInput.disabled = false;
                chatInput.placeholder = 'Type a message...';
                document.querySelector('#chat-form button[type=submit]').disabled = false;
                if (chatTarget) chatTarget.disabled = false;
                return;
            }

            if (data.type === 'presence') {
                onlineUserIDs = new Set((data.online_user_ids || []).map(String));
                applyPresenceIndicators();
                return;
            }

            if (data.type === 'refresh') {
                htmx.ajax('GET', '/rooms/' + roomId + '/dynamic', {target: '#room-dynamic', swap: 'outerHTML'});
                fetch('/rooms/' + roomId + '/members-list')
                    .then(function(r) { return r.json(); })
                    .then(function(resp) {
                        if (resp.members) {
                            Object.keys(memberPGPKeys).forEach(function(k) { delete memberPGPKeys[k]; });
                            resp.members.forEach(function(m) {
                                if (m.pgp_key) memberPGPKeys[m.id] = m.pgp_key;
                            });
                        }
                        if (resp.pgp_required !== undefined) {
                            roomPGPRequired = resp.pgp_required;
                        }
                        if (chatTarget && resp.members) {
                            const prevValue = chatTarget.value;
                            while (chatTarget.options.length > 1) chatTarget.remove(1);
                            resp.members.forEach(function(m) {
                                if (String(m.id) === currentUserID) return;
                                const opt = document.createElement('option');
                                opt.value = m.id;
                                opt.textContent = m.username;
                                chatTarget.appendChild(opt);
                            });
                            for (let i = 0; i < chatTarget.options.length; i++) {
                                if (chatTarget.options[i].value === prevValue) {
                                    chatTarget.value = prevValue;
                                    break;
                                }
                            }
                        }
                    })
                    .catch(function() {});
                return;
            }

            if (data.type === 'system') {
                const msgDiv = document.createElement('div');
                msgDiv.style.marginBottom = '0.5rem';
                msgDiv.style.color = '#666';
                msgDiv.style.fontStyle = 'italic';

                const time = new Date(data.created_at).toLocaleTimeString();
                msgDiv.innerHTML = '<small>(' + time + ')</small> ' + escapeHtml(data.message);

                chatMessages.appendChild(msgDiv);
                chatMessages.scrollTop = chatMessages.scrollHeight;
                return;
            }

            if (data.type === 'message') {
                if (data.id) {
                    if (seenMessageIds.has(data.id)) {
                        return;
                    }
                    seenMessageIds.add(data.id);
                    if (!lastSeenMessageId || data.id > lastSeenMessageId) {
                        lastSeenMessageId = data.id;
                    }
                }
                if (data.client_message_id && sentMessageIds.has(data.client_message_id)) {
                    // This is our own echo; already displayed optimistically.
                    return;
                }
                appendMessageAsync(data);
                return;
            }

            if (data.type === 'typing') {
                if (data.username && data.username !== currentUsername) {
                    typingUsers.add(data.username);
                    updateTypingIndicator();
                }
                return;
            }

            if (data.type === 'stopped_typing') {
                if (data.username) {
                    typingUsers.delete(data.username);
                    updateTypingIndicator();
                }
                return;
            }
        };

        ws.onerror = function(error) {
            console.error('WebSocket error:', error);
        };

        ws.onclose = function() {
            if (intentionalClose) return;
            console.log('Disconnected from chat');
            wasDisconnected = true;
            disablePresenceIndicators();
            const secs = Math.round(reconnectDelay / 1000);
            showReconnectMsg('Disconnected. Reconnecting in ' + secs + 's…');
            reconnectTimer = setTimeout(connect, reconnectDelay);
            reconnectDelay = Math.min(reconnectDelay * 2, 30000);
        };
    }

    async function loadServerHistory(beforeId) {
        if (loadingHistory) return;
        loadingHistory = true;
        try {
            const url = '/rooms/' + roomId + '/messages?limit=50' + (beforeId ? '&before_id=' + beforeId : '');
            const resp = await fetch(url);
            if (!resp.ok) return;
            const messages = await resp.json();
            if (!messages.length) return;

            if (!beforeId) {
                // Initial load: populate messageHistory chronologically and render all.
                for (let i = messages.length - 1; i >= 0; i--) {
                    const m = messages[i];
                    const data = {
                        type: 'message',
                        id: m.id,
                        username: m.username,
                        message: m.message,
                        created_at: m.created_at,
                        whisper: m.whisper,
                        pre_encrypted: m.pre_encrypted
                    };
                    messageHistory.push(data);
                    seenMessageIds.add(m.id);
                    updateSenderOptions(m.username);
                    if (!lastSeenMessageId || m.id > lastSeenMessageId) {
                        lastSeenMessageId = m.id;
                    }
                }
                earliestMessageId = messages[messages.length - 1].id;
                await rerenderAllMessages();
            } else {
                // Scrollback: prepend older messages to the top of the chat.
                const oldHeight = chatMessages.scrollHeight;
                const oldScrollTop = chatMessages.scrollTop;
                // Server returns newest first; prepend each to DOM in that order
                // so the oldest ends up at the very top.
                for (const m of messages) {
                    const data = {
                        type: 'message',
                        id: m.id,
                        username: m.username,
                        message: m.message,
                        created_at: m.created_at,
                        whisper: m.whisper,
                        pre_encrypted: m.pre_encrypted
                    };
                    messageHistory.unshift(data);
                    seenMessageIds.add(m.id);
                    updateSenderOptions(m.username);
                    // Prepend to DOM without grouping (always show header)
                    const savedLast = { username: lastMsgUsername, time: lastMsgTime };
                    resetGroupingState();
                    const el = await buildMessageElement(data);
                    chatMessages.insertBefore(el, chatMessages.firstChild);
                    lastMsgUsername = savedLast.username;
                    lastMsgTime = savedLast.time;
                }
                earliestMessageId = messages[messages.length - 1].id;
                // Preserve scroll position relative to existing content
                const newHeight = chatMessages.scrollHeight;
                chatMessages.scrollTop = oldScrollTop + (newHeight - oldHeight);
            }
        } catch (e) {
            console.error('Failed to load server history', e);
        } finally {
            loadingHistory = false;
            serverHistoryLoaded = true;
        }
    }

    // Infinite scroll: load older messages when scrolling near the top
    chatMessages.addEventListener('scroll', function() {
        if (chatMessages.scrollTop < 100 && earliestMessageId && !loadingHistory) {
            loadServerHistory(earliestMessageId);
        }
    });

    // Load server history first, then connect.
    loadServerHistory(0).then(function() {
        connect();
    });

    document.body.addEventListener('htmx:beforeSwap', function handler(evt) {
        if (evt.detail && evt.detail.target && evt.detail.target.id === 'content') {
            intentionalClose = true;
            if (reconnectTimer) clearTimeout(reconnectTimer);
            ws.close();
            document.body.removeEventListener('htmx:beforeSwap', handler);
        }
    });

    chatForm.onsubmit = async function(e) {
        e.preventDefault();
        const message = chatInput.value.trim();
        if (!message || ws.readyState !== WebSocket.OPEN) return;

        if (message.includes('-----BEGIN PGP PRIVATE KEY BLOCK-----')) {
            chatInput.style.outline = '2px solid red';
            setTimeout(function() { chatInput.style.outline = ''; }, 3000);
            appendSystemMessage('Warning: your message looks like a PGP private key. Clear the input and use the sidebar to load your key.');
            return;
        }

        const isWhisper = !!(chatTarget && parseInt(chatTarget.value, 10) > 0);
        const targetUserID = isWhisper ? parseInt(chatTarget.value, 10) : 0;

        const clientMsgId = crypto.randomUUID ? crypto.randomUUID() : (Math.random().toString(36).slice(2) + Date.now().toString(36));
        sentMessageIds.add(clientMsgId);

        // Optimistically append to local UI immediately
        appendMessageAsync({
            type: 'message',
            username: currentUsername,
            message: message,
            created_at: new Date().toISOString(),
            whisper: isWhisper,
            pre_encrypted: false,
            client_message_id: clientMsgId,
            self: true,
            pgp_required: roomPGPRequired
        });

        const payload = { type: 'message', message: message, client_message_id: clientMsgId };
        if (isWhisper) {
            payload.target_user_id = targetUserID;
        }

        if (roomPGPRequired) {
            const recipientIDs = payload.target_user_id
                ? [currentUserID, String(payload.target_user_id)]
                : Object.keys(memberPGPKeys);

            const missing = recipientIDs.filter(function(id) { return !memberPGPKeys[id]; });
            if (missing.length > 0) {
                appendSystemMessage('Cannot send: some recipients have no verified PGP key. Reload the page and try again.');
                return;
            }

            try {
                const encryptionKeys = await Promise.all(
                    recipientIDs.map(function(id) { return openpgp.readKey({ armoredKey: memberPGPKeys[id] }); })
                );
                payload.message = await openpgp.encrypt({
                    message: await openpgp.createMessage({ text: message }),
                    encryptionKeys: encryptionKeys,
                });
                payload.pre_encrypted = true;
            } catch (err) {
                appendSystemMessage('Encryption failed: ' + err.message);
                return;
            }
        }

        ws.send(JSON.stringify(payload));
        clearTimeout(typingDebounceTimer);
        clearTimeout(typingThrottleTimer);
        if (isTyping) {
            isTyping = false;
            ws.send(JSON.stringify({ type: 'stopped_typing' }));
        }
        chatInput.value = '';
    };

    chatInput.addEventListener('input', function() {
        if (ws.readyState !== WebSocket.OPEN) return;

        clearTimeout(typingDebounceTimer);
        typingDebounceTimer = setTimeout(function() {
            if (isTyping) {
                isTyping = false;
                ws.send(JSON.stringify({ type: 'stopped_typing' }));
            }
        }, 4000);

        if (!isTyping) {
            isTyping = true;
            ws.send(JSON.stringify({ type: 'typing' }));
            typingThrottleTimer = setTimeout(function() { isTyping = false; }, 2000);
        }
    });


    // --- PGP key management ---

    const pgpPersistToggle = document.getElementById('pgp-persist-toggle');
    pgpPersistToggle.checked = localStorage.getItem(roomId + ':pgp_persist_across_sessions') === 'true';

    pgpPersistToggle.onchange = function() {
        localStorage.setItem(roomId + ':pgp_persist_across_sessions', pgpPersistToggle.checked);
        if (!loadedPrivateKey) return;
        const armoredKey = document.getElementById('pgp-private-key-input').value;
        const passphrase = document.getElementById('pgp-passphrase-input').value;
        if (pgpPersistToggle.checked) {
            localStorage.setItem(roomId + ':pgp_armored_key', armoredKey);
            localStorage.setItem(roomId + ':pgp_passphrase', passphrase);
            sessionStorage.removeItem(roomId + ':pgp_armored_key');
            sessionStorage.removeItem(roomId + ':pgp_passphrase');
        } else {
            sessionStorage.setItem(roomId + ':pgp_armored_key', armoredKey);
            sessionStorage.setItem(roomId + ':pgp_passphrase', passphrase);
            localStorage.removeItem(roomId + ':pgp_armored_key');
            localStorage.removeItem(roomId + ':pgp_passphrase');
        }
    };

    function pgpKeyStore() {
        return pgpPersistToggle.checked ? localStorage : sessionStorage;
    }

    function savePGPKey(armoredKey, passphrase) {
        pgpKeyStore().setItem(roomId + ':pgp_armored_key', armoredKey);
        pgpKeyStore().setItem(roomId + ':pgp_passphrase', passphrase);
    }

    function clearPGPStorage() {
        localStorage.removeItem(roomId + ':pgp_armored_key');
        localStorage.removeItem(roomId + ':pgp_passphrase');
        sessionStorage.removeItem(roomId + ':pgp_armored_key');
        sessionStorage.removeItem(roomId + ':pgp_passphrase');
    }

    document.getElementById('pgp-load-key-btn').onclick = async function() {
        const armoredKey = document.getElementById('pgp-private-key-input').value.trim();
        const passphrase = document.getElementById('pgp-passphrase-input').value;
        const statusEl = document.getElementById('pgp-key-status');
        if (!armoredKey) { statusEl.textContent = 'No key entered.'; return; }
        try {
            let key = await openpgp.readPrivateKey({ armoredKey });
            if (!key.isDecrypted()) {
                key = await openpgp.decryptKey({ privateKey: key, passphrase });
            }
            loadedPrivateKey = key;
            savePGPKey(armoredKey, passphrase);
            statusEl.style.color = 'green';
            statusEl.textContent = 'Key loaded. Fingerprint: ' + key.getFingerprint().toUpperCase();
            await rerenderAllMessages();
            await autoHandlePGPVerification();
        } catch (err) {
            loadedPrivateKey = null;
            statusEl.style.color = 'red';
            statusEl.textContent = 'Failed to load key: ' + err.message;
        }
    };

    document.getElementById('pgp-clear-key-btn').onclick = async function() {
        loadedPrivateKey = null;
        clearPGPStorage();
        pgpPersistToggle.checked = false;
        localStorage.setItem(roomId + ':pgp_persist_across_sessions', 'false');
        document.getElementById('pgp-private-key-input').value = '';
        document.getElementById('pgp-passphrase-input').value = '';
        document.getElementById('pgp-key-status').textContent = '';
        document.getElementById('pgp-key-status').style.color = '';
        await rerenderAllMessages();
    };

    // Auto-load stored PGP key on page load
    (async function() {
        const persist = localStorage.getItem(roomId + ':pgp_persist_across_sessions') === 'true';
        const store = persist ? localStorage : sessionStorage;
        const storedKey = store.getItem(roomId + ':pgp_armored_key');
        if (!storedKey) return;
        const storedPassphrase = store.getItem(roomId + ':pgp_passphrase') || '';
        document.getElementById('pgp-private-key-input').value = storedKey;
        document.getElementById('pgp-passphrase-input').value = storedPassphrase;
        try {
            let key = await openpgp.readPrivateKey({ armoredKey: storedKey });
            if (!key.isDecrypted()) {
                key = await openpgp.decryptKey({ privateKey: key, passphrase: storedPassphrase });
            }
            loadedPrivateKey = key;
            const statusEl = document.getElementById('pgp-key-status');
            statusEl.style.color = 'green';
            statusEl.textContent = 'Key loaded. Fingerprint: ' + key.getFingerprint().toUpperCase();
            await autoHandlePGPVerification();
        } catch(err) {
            clearPGPStorage();
            loadedPrivateKey = null;
        }
    })();

    // --- Message helpers ---

    function isPGPMessage(text) {
        return text && text.trimStart().startsWith('-----BEGIN PGP MESSAGE-----');
    }

    async function tryDecrypt(armoredMessage) {
        if (!loadedPrivateKey) return { ok: false };
        try {
            const message = await openpgp.readMessage({ armoredMessage });
            const { data: plaintext } = await openpgp.decrypt({
                message,
                decryptionKeys: loadedPrivateKey,
            });
            return { ok: true, plaintext };
        } catch {
            return { ok: false };
        }
    }

    async function swapRoomSidebar(html, keepPGPOpen = false) {
        const existing = document.getElementById('room-sidebar');
        if (!existing) return;
        const pgpWasOpen = keepPGPOpen || (document.getElementById('pgp-keys-section')?.open ?? false);
        existing.outerHTML = html;
        const next = document.getElementById('room-sidebar');
        if (next) {
            htmx.process(next);
            // Restore private key inputs from storage (mirrors htmx:afterSwap logic)
            const persist = localStorage.getItem(roomId + ':pgp_persist_across_sessions') === 'true';
            const store = persist ? localStorage : sessionStorage;
            const storedKey = store.getItem(roomId + ':pgp_armored_key');
            const storedPass = store.getItem(roomId + ':pgp_passphrase') || '';
            const keyInput = document.getElementById('pgp-private-key-input');
            const passInput = document.getElementById('pgp-passphrase-input');
            const persistEl = document.getElementById('pgp-persist-toggle');
            if (keyInput) keyInput.value = storedKey || '';
            if (passInput) passInput.value = storedPass;
            if (persistEl) persistEl.checked = persist;
            const details = document.getElementById('pgp-keys-section');
            if (details && pgpWasOpen) details.open = true;
            applyPresenceIndicators();
        }
    }

    async function autoHandlePGPVerification() {
        if (!loadedPrivateKey) return;

        // State 2: challenge pending — decrypt and POST the answer directly
        const challengeTextarea = document.getElementById('pgp-challenge-ciphertext');
        if (challengeTextarea && challengeTextarea.value.trim()) {
            const result = await tryDecrypt(challengeTextarea.value.trim());
            if (!result.ok) return;
            const body = new URLSearchParams();
            body.append('decrypted_challenge', result.plaintext);
            const resp = await fetch('/rooms/' + roomId + '/pgp-key/verify', {method: 'POST', headers: {'X-CSRF-Token': csrfToken}, body});
            if (resp.ok) await swapRoomSidebar(await resp.text());
            return;
        }

        // State 1: no public key uploaded yet — derive and POST it directly
        const allPGPForms = document.querySelectorAll('#room-sidebar form[hx-post$="/pgp-key"]');
        const uploadForm = Array.from(allPGPForms).find(f => {
            const d = f.closest('details');
            return !d || d.id === 'pgp-keys-section';
        });
        if (uploadForm) {
            const armoredPublic = loadedPrivateKey.toPublic().armor();
            const body = new URLSearchParams();
            body.append('pgp_public_key', armoredPublic);
            const resp = await fetch('/rooms/' + roomId + '/pgp-key', {method: 'POST', headers: {'X-CSRF-Token': csrfToken}, body});
            if (resp.ok) {
                await swapRoomSidebar(await resp.text());
                await autoHandlePGPVerification(); // proceed to State 2
            }
        }
    }

    async function appendMessageAsync(data) {
        messageHistory.push(data);
        updateSenderOptions(data.username);

        if (searchActive) {
            if (messageMatchesSearch(data)) {
                // In search mode: always show header (results aren't contiguous)
                const savedLast = { username: lastMsgUsername, time: lastMsgTime };
                resetGroupingState();
                const el = await buildMessageElement(data);
                chatMessages.appendChild(el);
                chatMessages.scrollTop = chatMessages.scrollHeight;
                lastMsgUsername = savedLast.username;
                lastMsgTime = savedLast.time;
            }
        } else {
            const el = await buildMessageElement(data);
            chatMessages.appendChild(el);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        if (data.username !== currentUsername) {
            if (soundToggle.checked) playNotificationSound();
            const notifText = isPGPMessage(data.message) ? '(encrypted message)' : data.message;
            sendBrowserNotification(data.username, notifText);
        }
    }

    async function rerenderAllMessages() {
        chatMessages.innerHTML = '';
        if (reconnectMsgEl) reconnectMsgEl = null;
        resetGroupingState();
        searchActive = false;
        for (const data of messageHistory) {
            const el = await buildMessageElement(data);
            chatMessages.appendChild(el);
        }
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    async function buildMessageElement(data) {
        const msgDiv = document.createElement('div');
        msgDiv.style.marginBottom = '0.25rem';
        if (data.whisper) {
            msgDiv.style.color = '#6a1b9a';
            msgDiv.style.fontStyle = 'italic';
        }

        const time = new Date(data.created_at).toLocaleTimeString();
        const msgTime = new Date(data.created_at);

        // Group consecutive messages from the same sender within 10 minutes.
        // Whispers always show a header to make the target visible.
        const sameUser = lastMsgUsername === data.username;
        const within10m = lastMsgTime !== null && (msgTime - lastMsgTime) <= 10 * 60 * 1000;
        const grouped = sameUser && within10m && !data.whisper;

        lastMsgUsername = data.username;
        lastMsgTime = msgTime;

        if (!grouped) {
            msgDiv.style.marginTop = '0.5rem';
            const header = document.createElement('div');

            const nameEl = document.createElement('strong');
            nameEl.textContent = data.username;
            header.appendChild(nameEl);

            header.appendChild(document.createTextNode(' '));

            const timeEl = document.createElement('small');
            timeEl.textContent = '(' + time + ')';
            header.appendChild(timeEl);

            if (data.whisper) {
                const whisperEl = document.createElement('em');
                whisperEl.textContent = ' (whisper)';
                header.appendChild(whisperEl);
            }

            msgDiv.appendChild(header);
        }

        let displayText = data.message;
        let decrypted = false;

        if (isPGPMessage(data.message)) {
            const result = await tryDecrypt(data.message);
            if (result.ok) {
                displayText = result.plaintext;
                decrypted = true;
            }
        }

        if (decrypted || (data.self && data.pgp_required)) {
            const badge = document.createElement('span');
            badge.textContent = 'Decrypted';
            badge.style.cssText = 'display:inline-block;background:#2e7d32;color:#fff;font-size:0.7em;padding:1px 6px;border-radius:3px;margin-bottom:0.25rem;font-family:sans-serif;font-style:normal;';
            msgDiv.appendChild(badge);
            msgDiv.appendChild(document.createElement('br'));
        }

        const pre = document.createElement('pre');
        pre.style.margin = '0.1rem 0 0 0';
        pre.style.whiteSpace = 'pre-wrap';
        pre.style.fontFamily = 'monospace';
        pre.style.cursor = 'pointer';
        pre.title = 'Click to copy';
        pre.textContent = displayText;
        const capturedText = displayText;
        pre.onclick = function() {
            copyText(capturedText);
            pre.style.opacity = '0.4';
            setTimeout(function() { pre.style.opacity = '1'; }, 250);
        };

        msgDiv.appendChild(pre);
        return msgDiv;
    }

    function appendSystemMessage(text) {
        const msgDiv = document.createElement('div');
        msgDiv.style.marginBottom = '0.5rem';
        msgDiv.style.color = '#b00020';
        msgDiv.style.fontStyle = 'italic';
        msgDiv.textContent = text;
        chatMessages.appendChild(msgDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // --- Search bar event wiring ---
    (function() {
        const searchInput = document.getElementById('search-input');
        const searchRegexEl = document.getElementById('search-regex');
        const searchSenderEl = document.getElementById('search-sender');
        const searchClearBtn = document.getElementById('search-clear-btn');

        searchInput.addEventListener('input', applySearch);
        searchRegexEl.addEventListener('change', applySearch);
        searchSenderEl.addEventListener('change', applySearch);
        searchClearBtn.addEventListener('click', function() {
            searchInput.value = '';
            searchRegexEl.checked = false;
            searchSenderEl.value = '';
            applySearch();
        });
    })();

    function copyText(text) {
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).catch(fallbackCopy);
            return;
        }
        fallbackCopy();

        function fallbackCopy() {
            const t = document.createElement('textarea');
            t.value = text;
            t.setAttribute('readonly', '');
            t.style.position = 'fixed';
            t.style.left = '-9999px';
            t.style.top = '0';
            document.body.appendChild(t);
            t.focus();
            t.select();
            try { document.execCommand('copy'); } catch (e) {}
            document.body.removeChild(t);
        }
    }
})();
</script>
