<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>ssanta</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎅</text></svg>">
    <meta name="htmx-config" content='{"inlineScriptNonce":"{{.ScriptNonce}}"}'>
    <script src="https://unpkg.com/htmx.org@2.0.3"></script>
    <script src="https://cdn.jsdelivr.net/npm/openpgp@6/dist/openpgp.min.js"></script>
    {{if .CSRFToken}}
    <meta name="csrf-token" content="{{.CSRFToken}}">
    <script nonce="{{.ScriptNonce}}">
    document.addEventListener('htmx:configRequest', function(evt) {
        var token = document.querySelector('meta[name="csrf-token"]')?.getAttribute('content');
        if (token) {
            evt.detail.headers['X-CSRF-Token'] = token;
        }
    });

    // Delegated event handlers — declared once so HTMX-swapped fragments
    // pick them up automatically. Fragments use data-* attrs instead of
    // inline event attributes so we can keep script-src-attr locked down.
    (function() {
        function copyToClipboard(text) {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).catch(fallback);
                return;
            }
            fallback();
            function fallback() {
                var ta = document.createElement('textarea');
                ta.value = text;
                ta.setAttribute('readonly', '');
                ta.style.position = 'fixed';
                ta.style.left = '-9999px';
                ta.style.top = '0';
                document.body.appendChild(ta);
                ta.focus();
                ta.select();
                try { document.execCommand('copy'); } catch (e) {}
                document.body.removeChild(ta);
            }
        }

        document.addEventListener('click', function(evt) {
            var showDel = evt.target.closest('[data-action="show-delete-form"]');
            if (showDel) {
                var delUi = showDel.closest('#delete-account-ui');
                showDel.style.display = 'none';
                var delForm = delUi.querySelector('form');
                if (delForm) { delForm.style.display = 'flex'; delForm.querySelector('input')?.focus(); }
                return;
            }
            var hideDel = evt.target.closest('[data-action="hide-delete-form"]');
            if (hideDel) {
                var delUi2 = hideDel.closest('#delete-account-ui');
                hideDel.closest('form').style.display = 'none';
                delUi2.querySelector('[data-action="show-delete-form"]').style.display = '';
                return;
            }
            var showCp = evt.target.closest('[data-action="show-change-password-form"]');
            if (showCp) {
                var cpUi = showCp.closest('#change-password-ui');
                showCp.style.display = 'none';
                var cpPanel = cpUi.querySelector('div');
                if (cpPanel) { cpPanel.style.display = ''; cpPanel.querySelector('input')?.focus(); }
                return;
            }
            var hideCp = evt.target.closest('[data-action="hide-change-password-form"]');
            if (hideCp) {
                var cpUi2 = hideCp.closest('#change-password-ui');
                cpUi2.querySelector('[data-action="show-change-password-form"]').style.display = '';
                cpUi2.querySelector('div').style.display = 'none';
                return;
            }
            var btn = evt.target.closest('[data-copy-target]');
            if (btn) {
                var el = document.getElementById(btn.getAttribute('data-copy-target'));
                if (el) {
                    var mode = btn.getAttribute('data-copy-mode') || 'text';
                    copyToClipboard(mode === 'value' ? (el.value || el.textContent || '') : (el.textContent || ''));
                }
                return;
            }
            var dm = evt.target.closest('[data-action="start-dm"]');
            if (dm) {
                startDM();
                return;
            }
        });

        document.addEventListener('change', function(evt) {
            var el = evt.target.closest('[data-checkbox-value]');
            if (el && el.type === 'checkbox') {
                el.value = el.checked ? 'true' : 'false';
            }
        });

        document.addEventListener('submit', function(evt) {
            if (evt.target.matches('[data-prevent-default-submit]')) {
                evt.preventDefault();
            }
        });

        document.addEventListener('keydown', function(evt) {
            if (evt.key !== 'Enter') return;
            var el = evt.target.closest('[data-enter-click]');
            if (!el) return;
            evt.preventDefault();
            var target = document.getElementById(el.getAttribute('data-enter-click'));
            if (target) target.click();
        });

        function startDM() {
            var sel = document.getElementById('dm-partner-select');
            if (!sel || !sel.value) return;
            var body = new URLSearchParams({partner_id: sel.value});
            var token = document.querySelector('meta[name="csrf-token"]')?.getAttribute('content') || '';
            fetch('/dms', {
                method: 'POST',
                headers: {'Content-Type': 'application/x-www-form-urlencoded', 'X-CSRF-Token': token},
                body: body
            }).then(function(r) { if (r.redirected) window.location.href = r.url; }).catch(function(){});
        }
    })();
    </script>
    {{end}}
    <style>
        body { font-family: system-ui, sans-serif; max-width: 960px; margin: 2rem auto; padding: 0 1rem; }
        table { border-collapse: collapse; width: 100%; }
        th, td { text-align: left; padding: 0.5rem; border-bottom: 1px solid #ddd; }
        button { padding: 0.5rem 1rem; cursor: pointer; }
        input { padding: 0.5rem; }
        form { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
        .bar { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; }
        .cols { display: flex; gap: 2rem; align-items: flex-start; }
        .cols > section { flex: 1; }
        ul { padding-left: 1.25rem; }
        .error { color: #b00020; margin: 0.25rem 0 0.75rem; }
    </style>
</head>
<body>
    <h1>ssanta</h1>
    <div id="content" hx-get="{{if .BootstrapURL}}{{.BootstrapURL}}{{else}}/content{{end}}" hx-trigger="load"></div>
</body>
</html>
